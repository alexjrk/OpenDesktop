<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenDesktop</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="app">
      <header>
        <h1>OpenDesktop</h1>
        <div class="header-actions">
          <span class="container-count" id="container-count"></span>
          <button class="btn btn-refresh" id="refresh-btn" title="Refresh">↻ Refresh</button>
        </div>
      </header>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="running">Running</button>
        <button class="filter-btn" data-filter="stopped">Stopped</button>
      </div>

      <div class="table-wrapper">
        <table id="containers-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Image</th>
              <th>Status</th>
              <th>Ports</th>
              <th>ID</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="containers-body">
          </tbody>
        </table>
      </div>

      <div id="loading" class="loading">Loading containers...</div>
      <div id="error" class="error" style="display:none"></div>
      <div id="empty" class="empty" style="display:none">No containers found</div>
    </div>
  </body>
</html>
